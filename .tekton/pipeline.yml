apiVersion: tekton.dev/v1beta1
kind: Pipeline
metadata:
  name: cd-pipeline
spec:
  workspaces:
    - name: output
  tasks:
    - name: cleanup
      taskRef:
        name: cleanup
      workspaces:
        - name: source
          workspace: output

    - name: git-clone
      taskRef:
        name: git-clone
      runAfter: [cleanup]
      workspaces:
        - name: output
          workspace: output
      params:
        - name: url
          value: $(params.repo-url)

    - name: flake8
      taskRef:
        name: flake8
      runAfter: [git-clone]
      workspaces:
        - name: source
          workspace: output

    - name: nose
      taskRef:
        name: nose
      runAfter: [flake8]
      workspaces:
        - name: source
          workspace: output

    - name: buildah
      taskRef:
        name: buildah
      runAfter: [nose]
      workspaces:
        - name: source
          workspace: output

    - name: deploy
      taskRef:
        name: openshift-client
      runAfter: [buildah]
      params:
        - name: SCRIPT
          value: |
            oc create deployment $(params.app-name) --image=$(params.build-image) --dry-run=client -o yaml | oc apply -f -