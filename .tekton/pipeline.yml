apiVersion: tekton.dev/v1beta1
kind: Pipeline
metadata:
  name: cd-pipeline
spec:
  # --- ADD THIS SECTION ---
  params:
    - name: repo-url
      type: string
      description: The URL of the GitHub repository
    - name: app-name
      type: string
      description: The name of the application to deploy
    - name: build-image
      type: string
      description: The full image registry path
  # -------------------------
  workspaces:
    - name: output
  tasks:
    - name: cleanup
      taskRef:
        name: cleanup
      workspaces:
        - name: source
          workspace: output

    - name: git-clone
      taskRef:
        name: git-clone
      runAfter: [cleanup]
      workspaces:
        - name: output
          workspace: output
      params:
        - name: url
          value: $(params.repo-url)
        - name: revision
          value: main
        - name: subdirectory
          value: ""  
        - name: deleteExisting
          value: "true"

    - name: flake8
      taskRef:
        name: flake8
      runAfter: [git-clone]
      workspaces:
        - name: source
          workspace: output

    - name: nose
      taskRef:
        name: nose
      runAfter: [flake8]
      workspaces:
        - name: source
          workspace: output

    - name: buildah
      taskRef:
        name: buildah
      runAfter: [nose]
      workspaces:
        - name: source
          workspace: output
      params:
        - name: IMAGE
          value: $(params.build-image)

    - name: deploy
      taskRef:
        name: openshift-client
      runAfter: [buildah]
      params:
        - name: SCRIPT
          value: |
            oc create deployment $(params.app-name) --image=$(params.build-image) --dry-run=client -o yaml | oc apply -f -